name: pac_dart
description: "PAC·DART — treinador de digitação que ensina Dart & Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  google_fonts: ^7.1.0
  shared_preferences: ^2.5.3
  flutter_tts: ^4.2.2
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  # iframe do DartPad (só usado no build web, via import condicional)
  web: ^1.1.0
  firebase_ai: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/curriculo.json
    - assets/master.json
    - assets/roda.json
    - assets/backgrounds/
